version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - unconvert
    - unparam
    - whitespace
    - bodyclose
    - noctx
    - revive

  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*database/sql.Rows).Close
        - (*database/sql.DB).Close
    gosec:
      excludes:
        - G104
        - G101
        - G117
        - G304
        - G701
        - G703
        - G704
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          disabled: true
        - name: unused-parameter
        - name: error-return

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    gofmt:
      simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-dirs:
    - ui/node_modules
